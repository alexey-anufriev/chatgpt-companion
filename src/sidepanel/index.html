<!doctype html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; frame-src https://chatgpt.com https://chat.openai.com; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT Companion</title>
    <link rel="stylesheet" href="index.css" />
</head>
<body>
<div class="app">
    <div class="toolbar">
        <div class="meta">
            <div id="sourceTitle" class="title"></div>
            <div id="sourceUrl" class="url"></div>
        </div>
        <div class="actions">
            <button id="copyPromptBtn" type="button">Copy prompt</button>
            <button id="reinsertBtn" type="button">Re-insert prompt</button>
            <button id="settingsBtn" type="button">Settings</button>
            <button id="closeBtn" type="button">Clear & Close</button>
        </div>
    </div>

    <div id="languageMismatchPrompt" class="languageMismatch hidden">
        <div id="languageMismatchText" class="languageMismatchText"></div>
        <div class="languageMismatchActions">
            <button id="continueSessionBtn" type="button">Continue here</button>
            <button id="startNewSessionBtn" type="button">Start new</button>
            <button id="cancelSessionBtn" type="button">Cancel</button>
        </div>
    </div>

    <div class="frameWrap">
        <iframe
                id="chatgptFrame"
                title="ChatGPT"
                referrerpolicy="strict-origin-when-cross-origin"
        ></iframe>
    </div>
</div>

<script type="module" src="index.js"></script>
</body>
</html>
