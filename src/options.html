<!doctype html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; style-src 'self'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT Companion Settings</title>
    <link rel="stylesheet" href="options.css" />
</head>
<body>
<main class="settings">
    <div class="settingsHeader">
        <h1>ChatGPT Companion Settings</h1>
        <button id="saveSettingsBtn" type="button" disabled>Save</button>
    </div>

    <section class="preferences">
        <label for="preferredLanguage">Preferred language</label>
        <input id="preferredLanguage" type="text" autocomplete="off" />
    </section>

    <section class="promptTemplates">
        <div class="promptTemplatesHeader">
            <h2>Prompt Templates</h2>
            <button id="addPromptTemplateBtn" type="button">Add Prompt</button>
        </div>
        <div id="promptTemplatesList" class="promptTemplatesList"></div>
    </section>

    <section class="sessions">
        <div class="sessionsHeader">
            <h2>Persisted Sessions</h2>
            <span id="sessionCount" class="sessionCount">0</span>
        </div>
        <div id="sessionsList" class="sessionsList"></div>
    </section>

    <button id="clearDataBtn" type="button">Clear Data and Cache</button>
    <p id="status" class="status" role="status" aria-live="polite"></p>
</main>

<script type="module" src="options.js"></script>
</body>
</html>
